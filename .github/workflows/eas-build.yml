name: EAS Build -> Play Store

on:
  push:
    branches: ["main"]

permissions:
  contents: read

jobs:
  build-and-submit:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Validate EXPO_TOKEN
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${EXPO_TOKEN:-}" ]; then
            echo "ERROR: EXPO_TOKEN secret is not set."
            exit 1
          fi

      - name: Install EAS CLI
        run: npm install -g eas-cli@latest

      - name: Build Android and auto-submit to Play Console
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          set -euo pipefail
          eas build --platform android --profile production --non-interactive --wait --auto-submit